<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Yggdrasil-Board</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/board.css" />
    <script async src="scripts.js"></script>
    <link rel="icon" href="/assets/images/favicon.ico" type="images/x-icon" />
  </head>

  <body>
    <header>
      <h1>Yggdrasil</h1>

      <nav>
        <ul>
          <li><a href="index.html"> Home</a></li>
          <li><a href="board.html">Board</a></li>
          <li><a href="party.html">Party</a></li>
          <li><a href="post.html">Post</a></li>
          <li><a href="detail.html">About</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h2>Find What Your Heart Desires</h2>
        <input
          type="text"
          id="search"
          class="search-box"
          placeholder="Search..."
        />
      </section>

      <section>
        <h2>Refine Your Search</h2>
        <button>Oldest to Newest</button>
        <button>Newest to Oldest</button>
        <button>Most Recent</button>
        <button>Genre</button>
        <button>Party Count</button>
      </section>

      <section>
        <h2>Quest Cards</h2>

        <div class="card_quest">
          <h3 class="card_head">(Quest Name)</h3>

          <div class="info_quest">
            <div class="card_info">
              <span class="label">Genre</span>
              <p id="=Genre"></p>
            </div>

            <div class="card_info">
              <span class="label">Difficulty</span>
              <div class="rating_star" id="rating">
                <span class="star hollow full">★</span>
                <span class="star hollow full">★</span>
                <span class="star hollow full">★</span>
                <span class="star hollow full">★</span>
                <span class="star hollow full">★</span>
              </div>
            </div>

            <div class="card_info">
              <span class="label">Reward</span>
              <p id="=Reward"></p>
            </div>

            <div class="card_info">
              <span class="label">Count</span>
              <p id="=Party_Count"></p>
            </div>
          </div>
          <div class="card_descript">
            <h3>Description:</h3>
            <p id="card_description"></p>
          </div>
          <div class="card_redirect">
            <a href="party.html"> Details </a>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 Yggdrasil. Made with passion and a bit of caffeine</p>
      <img src="assets/images/Footer.png" alt="raitnie" />
    </footer>
  </body>
</html>
